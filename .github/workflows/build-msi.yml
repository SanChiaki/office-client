name: Build MSI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read

env:
  Configuration: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/OfficeAgent.Frontend/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install mock server dependencies
        run: cd tests/mock-server && npm install

      - name: Run unit tests
        run: |
          dotnet test tests/OfficeAgent.Core.Tests/OfficeAgent.Core.Tests.csproj --verbosity minimal
          dotnet test tests/OfficeAgent.Infrastructure.Tests/OfficeAgent.Infrastructure.Tests.csproj --verbosity minimal

      - name: Run integration tests
        run: dotnet test tests/OfficeAgent.IntegrationTests/OfficeAgent.IntegrationTests.csproj --verbosity minimal

      - name: Build installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File "installer/OfficeAgent.Setup/build.ps1"

      - name: Upload MSI artifacts
        uses: actions/upload-artifact@v6
        with:
          name: OfficeAgent-MSI-${{ github.sha }}
          path: artifacts/installer/*.msi
          retention-days: 30
