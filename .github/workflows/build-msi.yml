name: Build MSI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read

env:
  Configuration: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/OfficeAgent.Frontend/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File "installer/OfficeAgent.Setup/build.ps1"

      - name: Upload MSI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OfficeAgent-MSI-${{ github.sha }}
          path: artifacts/installer/*.msi
          retention-days: 30
